<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — GeneGuidelines</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        line-height: 1.5;
        max-width: 36rem;
      }
      code {
        background: #f4f4f5;

  <body>
    <h1>Sign in required</h1>
    <p>
      This demo uses HTTP Basic Auth. Your browser did not send credentials (common

      Try opening
      <code>http://demo:YOUR_PASSWORD@HOST:5173/</code>
      (replace host and password), or use Safari/Chrome and accept the login prompt.
    </p>
    <p><a href="/">Retry</a></p>
