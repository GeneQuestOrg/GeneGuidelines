name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Surface high-severity vulnerabilities for visibility but do not fail
      # the build on transitive issues outside our direct dependencies.
      - name: npm audit (informational)
        run: npm audit --audit-level=high || true
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -w frontend-public
      - run: npm run build:frontends

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: pytest
        env:
          # Tests import modules that initialise an OpenAI client at import
          # time; the dummy key satisfies the constructor without making any
          # network calls.
          OPENAI_API_KEY: "sk-test-dummy"
          AGENT_NO_MCP: "1"
        run: |
          python3 -m pytest backend/tests backend/content/tests -q \
            --ignore=backend/tests/test_pubmed_flow_agentic.py \
            --ignore=backend/tests/test_pubmed_authors_fetch_executor.py
