# Pre-commit hooks. Install once with:
#   pip install pre-commit && pre-commit install
#
# Hooks run on staged files only and are scoped to Phase 1 gentle rules (see
# pyproject.toml). Phase 2 will turn on Ruff format + mypy as gating hooks.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        # Phase 1: lint only, no auto-fix. Use ``ruff check --fix`` manually if
        # you want to apply suggestions.
        args: ["--no-fix"]

  # Phase 2 will enable these:
  # - id: ruff-format
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.13.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [pydantic, fastapi]
