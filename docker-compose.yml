# GeneGuidelines — one-command local run.
#
#   docker compose up --build
#
# Public site:   http://localhost:5173
# Admin app:     http://localhost:5174
# Backend API:   http://localhost:8000  (also reachable via /api from either frontend)
#
# Requires an `.env` file in the repo root with at minimum:
#   OPENAI_API_KEY=...                (or DEEPSEEK_API_KEY / OPENROUTER_API_KEY)
#   MODEL_PROFILE=production          (or test / openrouter)
# Copy backend/.env.example to .env and fill in the values you need.
#
# Production-mode (no hot reload). For hot-reload development install Python +
# Node locally and run `make dev` instead.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      # The Dockerfile sets DB_PATH=/data/tickets.db; bind it to a named volume
      # so the SQLite file survives container recreation.
      DB_PATH: /data/tickets.db
    volumes:
      - sqlite-data:/data
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request, sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"   # public site
      - "5174:81"   # admin app

volumes:
  sqlite-data:
