# GeneGuidelines — one-command local run.
#
#   docker compose up --build
#
# Production demo (HTTP basic auth on whole site):
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml up --build
#   See deploy/README.md
#
# Public site:   http://localhost:5173
# Admin app:     http://localhost:5174
# Backend API:   http://localhost:8000  (also reachable via /api from either frontend)
#
# Requires a repo-root `.env` (copy backend/.env.example → .env). Examples:
#   MODEL_PROFILE=openrouter + OPENROUTER_API_KEY=...
#   MODEL_PROFILE=vllm + LLM_BASE_URL + LLM_API_KEY (from inside Docker use host.docker.internal, not 127.0.0.1)
#   MODEL_PROFILE=production + OPENAI_API_KEY=...
#
# Postgres data persists in the `postgres-data` volume. Do not run `docker compose down -v`
# unless you intend to wipe the database.
#
# Production-mode (no hot reload). For hot-reload development install Python +
# Node locally and run `make dev` instead.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ggapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
      POSTGRES_DB: ${POSTGRES_DB:-geneguidelines}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    # Pin the prod arch (linux/amd64). On x86 hosts this is a no-op (native); on
    # Apple Silicon it runs under Rosetta, which avoids the SIGILL the linux/arm64
    # `cryptography` Rust wheel hits under Docker Desktop (native dev = `make dev`).
    # Prod is unaffected: it builds via `az acr build` (Azure x86), not compose.
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DB_URL: postgresql://${POSTGRES_USER:-ggapp}:${POSTGRES_PASSWORD:-testpass}@postgres:5432/${POSTGRES_DB:-geneguidelines}
      # Web admits jobs + serves status from the DB only — it runs ZERO research
      # workers (=0). The dedicated `worker` service below does the heavy lifting,
      # so a long PubMed/finder run can never block serving the site.
      RESEARCH_QUEUE_MAX_CONCURRENT: "0"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request, sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Dedicated research worker — same image as `backend`, no HTTP ingress. Claims
  # research_jobs rows from the same Postgres and runs the heavy fan-out so the
  # web process stays responsive. Mirrors the prod `gg-worker` Container App.
  worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "backend.worker"]
    env_file: .env
    environment:
      DB_URL: postgresql://${POSTGRES_USER:-ggapp}:${POSTGRES_PASSWORD:-testpass}@postgres:5432/${POSTGRES_DB:-geneguidelines}
      # This process IS the research worker pool.
      RESEARCH_QUEUE_MAX_CONCURRENT: "1"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"   # public site
      - "5174:81"   # admin app

volumes:
  postgres-data:
